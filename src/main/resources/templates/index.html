<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Search Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 32px;
        }
        h1 {
            text-align: center;
            color: #d32f2f;
        }
        form {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        input[type="text"] {
            width: 60%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px 0 0 4px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            background: #d32f2f;
            color: #fff;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #b71c1c;
        }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .video-card {
            background: #fafafa;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            padding: 12px;
            text-align: center;
        }
        .video-card img {
            width: 100%;
            border-radius: 4px;
        }
        .video-title {
            font-weight: bold;
            margin: 10px 0 6px 0;
            color: #333;
        }
        .video-desc {
            font-size: 0.95em;
            color: #666;
        }
        @media (max-width: 600px) {
            .container { padding: 12px; }
            input[type="text"] { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>YouTube Video Search</h1>
    <form id="searchForm">
        <input type="text" id="query" placeholder="Search for videos..." required>
        <button type="submit">Search</button>
    </form>
    <div id="results" class="results"></div>
</div>
<script>
    document.getElementById('searchForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const query = document.getElementById('query').value.trim();
        if (!query) return;

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<p>Loading...</p>';

        try {
            const response = await fetch(`/api/v1/search?query=${encodeURIComponent(query)}`);
            if (!response.ok) throw new Error('API error');
            const videos = await response.json();

            if (!videos.length) {
                resultsDiv.innerHTML = '<p>No results found.</p>';
                return;
            }

            resultsDiv.innerHTML = videos.map(video => `
                <div class="video-card">
                    <a href="https://www.youtube.com/watch?v=${video.id.videoId}" target="_blank">
                        <img src="${video.snippet.thumbnails.default.url}" alt="Thumbnail">
                    </a>
                    <div class="video-title">${video.snippet.title}</div>
                    <div class="video-desc">${video.snippet.description}</div>
                </div>
            `).join('');
        } catch (err) {
            resultsDiv.innerHTML = '<p style="color:red;">Error fetching results.</p>';
        }
    });
</script>
</body>
</html>
